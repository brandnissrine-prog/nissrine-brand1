<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Admin Pro V4</title>

<style>

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}

/* ===== BODY ===== */
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#667eea,#764ba2);
padding:20px;
transition:0.3s;
}

.dark{background:#111;color:#eee}

/* ===== NAV ===== */
.nav{display:flex;gap:10px;margin-bottom:15px;}
.nav button{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;}

/* ===== TITLE ===== */
h2{text-align:center;color:white;margin-bottom:10px;}

/* ===== DASHBOARD ===== */
#dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:10px;
}
.card{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

/* ===== SEARCH ===== */
#searchInput{
width:100%;
padding:10px;
border:none;
border-radius:10px;
margin-bottom:10px;
}

/* ===== FILTER ===== */
.filters{display:flex;gap:5px;margin-bottom:10px;}
.filters button{flex:1;padding:8px;border:none;border-radius:8px;cursor:pointer;}

/* ===== ORDER ===== */
.order{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.order .btn{
display:block;
width:100%;
margin:5px 0;
}
.order{
word-wrap:break-word;
}
/* ===== STATUS ===== */
.status{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:12px;
color:white;
margin-bottom:5px;
}

.status.new{background:#ff9800;}
.status.confirmed{background:#2196f3;}
.status.shipped{background:#ff5722;}
.status.delivered{background:#4caf50;}

/* ===== LIST COLORS ===== */
.done{color:green;font-weight:bold;}
.not-done{color:red;font-weight:bold;}

/* ===== LIST ===== */
#simpleList{
background:white;
padding:15px;
border-radius:10px;
max-height:300px;
overflow:auto;
}

/* ===== BUTTON ===== */
.btn{padding:5px 8px;border:none;border-radius:6px;margin:2px;cursor:pointer;}

/* ===== POPUP ===== */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

/* ===== TOAST ===== */
#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:10px;
border-radius:10px;
opacity:0;
transition:0.3s;
}
#dashboard{
grid-template-columns:repeat(2,1fr);
}
#dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
}
@media (max-width:600px){

body{
padding:10px;
}

h2{
font-size:18px;
}

.order{
padding:10px;
}

.card{
padding:8px;
font-size:14px;
}

.nav button{
padding:8px;
font-size:14px;
}

#searchInput{
padding:8px;
}

}
</style>
</head>

<body>

<div class="nav">
<button onclick="showOrders()">📦</button>
<button onclick="showList()">📋</button>
<button onclick="toggleDark()">🌙</button>
</div>

<h2>Admin Pro V4</h2>

<div id="dashboard"></div>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<input id="searchInput" placeholder="🔍 بحث..." onkeyup="searchOrders()">

<div class="filters">
<button onclick="filterOrders('all')">الكل</button>
<button onclick="filterOrders('new')">جديد</button>
<button onclick="filterOrders('delivered')">مكتمل</button>
</div>

<div id="ordersSection"><div id="orders"></div></div>

<div id="listSection" style="display:none;">
  <button onclick="clearList()" style="background:red;color:white;padding:10px;border:none;border-radius:8px;">
🗑 مسح اللائحة كاملة
</button>
<h3 style="color:white;text-align:center;">📋 اللائحة</h3>
<div id="simpleList"></div>
</div>

<div id="popup"><div class="popup-box" id="popupContent"></div></div>

<div id="toast"></div>

<script>

/* ===== UTILS ===== */
function formatDate(t){return new Date(t).toLocaleString();}

function getStatusLabel(s){
if(s==="confirmed") return "✔️ تم التأكيد";
if(s==="shipped") return "🚚 في الشحن";
if(s==="delivered") return "✅ تم التسليم";
return "🆕 جديد";
}

/* ===== DASHBOARD ===== */
function loadDashboard(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let total=0,done=0;

orders.forEach(o=>{
if(o.completed){
total+=Number(o.total)||0;
done++;
}
});

dashboard.innerHTML=`
<div class="card">💰 ${total}</div>
<div class="card">📦 ${orders.length}</div>
<div class="card">✅ ${done}</div>
<div class="card">🆕 ${orders.filter(o=>!o.completed).length}</div>
`;
}

/* ===== RENDER ===== */
function renderOrders(arr){

let html="";

arr.forEach((o,i)=>{

html+=`
<div class="order">

<span class="status ${o.status||'new'}">
${getStatusLabel(o.status)}
</span>

👤 <b>${o.name}</b><br>
📞 ${o.phone}<br>
🏙 ${o.city || "غير محدد"}<br>
🏠 ${o.address || "غير محدد"}<br>

🕒 ${o.createdAt ? formatDate(o.createdAt) : "غير معروف"}

<hr>

${o.products && o.products.length > 0 
? o.products.map(p=>`• ${p.name} | ${p.color} | ${p.price} درهم`).join("<br>")
: "❌ لا توجد منتجات"}

<hr>

💰 <b>${o.total || 0} درهم</b>

<br>

<button class="btn" onclick="setStatus(${i},'confirmed')">✔️ تأكيد</button>
<button class="btn" onclick="setStatus(${i},'shipped')">🚚 شحن</button>
<button class="btn" onclick="setStatus(${i},'delivered')">✅ تسليم</button>

<button class="btn" onclick="openWhatsApp('${o.phone}','${o.name}','${o.status}')">📲 واتساب</button>

<button class="btn" onclick="viewOrder(${i})">👁 تفاصيل</button>
<button class="btn" onclick="deleteOrder(${i})">❌ حذف</button>

</div>
`;
});

document.getElementById("orders").innerHTML=html;

}

/* ===== LOAD ===== */
function loadOrders(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
renderOrders(orders);
syncList();
loadList();
loadDashboard();
}

/* ===== LIST ===== */
function loadList(){
let list=JSON.parse(localStorage.getItem("listOrders"))||[];

let html="";

list.forEach(o=>{
html+=`
<div class="${o.completed ? 'done':'not-done'}">
${o.name} | ${o.phone}
</div>`;
});

simpleList.innerHTML=html;
}

/* ===== DELETE ===== */
function deleteOrder(i){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let list=JSON.parse(localStorage.getItem("listOrders"))||[];

list.push(orders[i]);
orders.splice(i,1);

localStorage.setItem("orders",JSON.stringify(orders));
localStorage.setItem("listOrders",JSON.stringify(list));

loadOrders();
}

/* ===== STATUS ===== */
function setStatus(i,s){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
orders[i].status=s;
if(s==="delivered") orders[i].completed=true;

localStorage.setItem("orders",JSON.stringify(orders));
loadOrders();
}

/* ===== WHATSAPP ===== */
function openWhatsApp(phone,name,status){
let num=phone.replace(/^0/,"212");
let msg="";

if(status==="delivered") msg="تم التسليم";
else msg="مرحبا";

window.open("https://wa.me/"+num+"?text="+msg);
}

/* ===== SYNC ===== */
function syncList(){
let orders=JSON.parse(localStorage.getItem("orders"))||[];
let list=JSON.parse(localStorage.getItem("listOrders"))||[];

orders.forEach(o=>{
if(!list.find(x=>x.phone===o.phone)){
list.push(o);
}
});

localStorage.setItem("listOrders",JSON.stringify(list));
}

/* ===== NAV ===== */
function showOrders(){ordersSection.style.display="block";listSection.style.display="none";}
function showList(){ordersSection.style.display="none";listSection.style.display="block";}

window.onload=loadOrders;
function viewOrder(i){

let orders = JSON.parse(localStorage.getItem("orders")) || [];
let o = orders[i];

document.getElementById("popupContent").innerHTML = `
<h3>${o.name}</h3>

<p>📞 ${o.phone}</p>
<p>🏙 ${o.city}</p>
<p>🏠 ${o.address}</p>
<p>🕒 ${o.createdAt ? formatDate(o.createdAt) : ""}</p>

<hr>

${o.products.map(p=>`
<div>• ${p.name} | ${p.color} | ${p.price} درهم</div>
`).join("")}

<hr>

<p>💰 ${o.total} درهم</p>

<button onclick="closePopup()">إغلاق</button>
`;

document.getElementById("popup").style.display="flex";
}

function clearList(){

if(confirm("واش متأكد تبغي تمسح اللائحة كاملة؟")){

localStorage.removeItem("listOrders");

loadList();

}

}
</script>

</body>
</html>
