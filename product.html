<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Product</title>

<style>
body{font-family:Arial;background:#f6f6f6;padding:20px}
.container{max-width:400px;margin:auto;background:white;padding:10px;border-radius:10px}

.main-img{
width:100%;
height:300px;
object-fit:cover;
border-radius:10px;
}

.thumbs{
display:flex;
gap:5px;
margin-top:10px;
}

.thumbs img{
width:70px;
height:70px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
border:2px solid transparent;
}

.thumbs img.active{
border-color:black;
}
</style>
</head>

<body>
<button onclick="goBack()" style="
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:25px;
background:#444;
color:white;
font-size:14px;
cursor:pointer;
">
⬅ الرجوع للصفحة الرئيسية
</button>
<div class="container">

<img id="mainImg" class="main-img">

<h3 id="name"></h3>
<p id="price"></p>

<div class="thumbs" id="thumbs"></div>

</div>

<script>

let product = JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = product.price + " درهم";

let mainImg = document.getElementById("mainImg");
mainImg.src = product.images[0];

let thumbs = document.getElementById("thumbs");

product.images.forEach((img,i)=>{

thumbs.innerHTML += `
<img src="${img}" onclick="changeImg(this,'${img}')">
`;

});

function changeImg(el,src){

mainImg.src = src;

document.querySelectorAll(".thumbs img")
.forEach(i=>i.classList.remove("active"));

el.classList.add("active");
}
function goBack(){
window.history.back();
}
</script>

</body>
</html>
