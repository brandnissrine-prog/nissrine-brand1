    - ${i.price} درهم
  </span>

  <button class="remove" onclick="cart.splice(${index},1);update()">حذف</button>
</p>`;

total+=i.price;
});

document.getElementById("items").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}
document.getElementById("addSound").play();
/* CART */
function toggleCart(){
document.getElementById("cart").classList.toggle("open");
document.body.classList.toggle("cart-open");
}

/* SHARE */
function share(){
if(navigator.share){
navigator.share({
title:"Store",
url:location.href
});
}
}

/* WHATSAPP */
function send(){

if(cart.length === 0){
alert("السلة فارغة 🛒");
return;
}

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let address = document.getElementById("address").value;
let city = document.getElementById("city").value;

let msg = "🛍️ طلب جديد %0A";
msg += "----------------------%0A";

cart.forEach(i=>{
msg += `• ${i.name} | ${i.color} | ${i.price} درهم %0A`;
});

msg += "----------------------%0A";
msg += `👤 الاسم: ${name} %0A`;
msg += `📞 الهاتف: ${phone} %0A`;
msg += `📍 المدينة: ${city} %0A`;
msg += `🏠 العنوان: ${address} %0A`;

window.open("https://wa.me/212614986795?text="+msg);
}
function add(i){

cart.push({
name:products[i].name,
price:products[i].price,
color:selected[i]||"بدون لون"
});

update();

/* 🔊 نفس صوت النجوم */
let sound = document.getElementById("addSound");
if(sound){
sound.currentTime = 0;
sound.play().catch(()=>{});
}

/* toast */
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);

/* bump */
let c=document.getElementById("count");
c.classList.add("bump");
setTimeout(()=>c.classList.remove("bump"),300);
}
