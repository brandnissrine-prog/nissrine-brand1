<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesrine Brand1</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:#f5f5f5;
direction: rtl;
}

/* ===== HEADER ===== */
header{
background:black;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:35px;
height:35px;
border-radius:50%;
}

.header-actions{
display:flex;
align-items:center;
gap:10px;
}

.insta-btn{
background:#E1306C;
color:white;
padding:5px 10px;
border-radius:6px;
text-decoration:none;
font-size:12px;
}

/* ===== BANNER ===== */
.banner{
width:100%;
height:220px;
background-image:url("c:\Users\Nissrine zibar\Downloads\Gemini_Generated_Image_fs5cvbfs5cvbfs5c.png");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
position:relative;
margin-bottom:10px;
}

.banner::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255, 0, 150, 0.4);
}
.banner-text{
position:relative;
color:white;
text-align:center;
z-index:1;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp {
0%{opacity:0;transform:translateY(25px);}
100%{opacity:1;transform:translateY(0);}
}

.banner-text h2{animation:fadeUp 1s ease-in-out;}
.banner-text p{animation:fadeUp 1.5s ease-in-out;}
.banner-text button{animation:fadeUp 2s ease-in-out;}

/* ===== PRODUCTS ===== */
.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:8px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* ===== CART ===== */
.cart{
position:fixed;
top:0;
right:0;
width:90%;
max-width:320px;
height:100%;
background:white;
padding:15px;
display:none;
overflow:auto;
box-shadow:-5px 0 10px rgba(0,0,0,0.2);
z-index:9999;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
}

.total{
font-weight:bold;
margin-top:10px;
}

.remove{
width:auto;
padding:3px 8px;
background:red;
border:none;
border-radius:5px;
margin-right:10px;
cursor:pointer;
color:white;
}

.buy-btn{
background:green;
margin-top:10px;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>

<div class="logo">
<img src="c:\Users\Nissrine zibar\Downloads\Gemini_Generated_Image_27v39i27v39i27v3.png">
<span>Nesrine Brand1</span>
</div>

<div class="header-actions">

<a href="https://www.instagram.com/nissrine_brand1?igsh=MXU1MHFpNGZzcTJjaA%3D%3D&utm_source=qr" target="_blank" class="insta-btn">
Instagram
</a>

<button onclick="toggleCart()">
🛒 (<span id="count">0</span>)
</button>

</div>

</header>

<!-- ===== BANNER ===== -->
<div class="banner">
<div class="banner-text">
<h2>مرحبا بك في Nesrine Brand1</h2>
<p>أجمل العبايات بأثمنة مناسبة وجودة عالية</p>
<button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
تسوق الآن
</button>
</div>
</div>

<!-- ===== PRODUCTS ===== -->
<div class="products" id="products"></div>

<!-- ===== CART ===== -->
<div class="cart" id="cart">

<h3>السلة</h3>

<div id="items"></div>

<p class="total">
المجموع: <span id="total">0</span> درهم
</p>

<h4>معلومات الزبون</h4>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الهاتف">
<input id="address" placeholder="العنوان">

<select id="city">
<option value="الدار البيضاء">الدار البيضاء</option>
<option value="الرباط">الرباط</option>
<option value="مراكش">مراكش</option>
<option value="فاس">فاس</option>
<option value="طنجة">طنجة</option>
<option value="أكادير">أكادير</option>
<option value="مكناس">مكناس</option>
<option value="وجدة">وجدة</option>
<option value="القنيطرة">القنيطرة</option>
<option value="تطوان">تطوان</option>
<option value="الجديدة">الجديدة</option>
<option value="آسفي">آسفي</option>
<option value="الناظور">الناظور</option>
<option value="بني ملال">بني ملال</option>
<option value="العيون">العيون</option>
</select>

<!-- زر الشراء الجديد -->
<button class="buy-btn" onclick="send()">
اضغط هنا للشراء
</button>

<button onclick="toggleCart()">إغلاق</button>

</div>

<script>

let products = [
{name:"عبايه نور",price:1000,img:"https://i.postimg.cc/bw9L4Qhq/Whats-App-Image.jpg"},
{name:"عباية فخم",price:450,img:"https://i.postimg.cc/1RHNwJsq/177777.jpg"},
{name:"عباية صيفية",price:250,img:"https://i.postimg.cc/1RjskqHh/377777.jpg"},
{name:"عباية خليجية",price:380,img:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=400"},
{name:"عباية مطرزة",price:500,img:"https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=400"},
{name:"عباية بسيطة",price:220,img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=400"}
];

let cart=[];

/* ===== PRODUCTS ===== */
let container=document.getElementById("products");

let html="";

products.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.price} درهم</p>
<button onclick="add('${p.name}',${p.price})">إضافة للسلة</button>
</div>
`;
});

container.innerHTML=html;

/* ===== ADD ===== */
function add(name,price){
cart.push({name,price});
update();
}

/* ===== REMOVE ===== */
function removeItem(index){
cart.splice(index,1);
update();
}

/* ===== UPDATE ===== */
function update(){

let items="";
let total=0;

cart.forEach((i,index)=>{
items+=`
<p>
${i.name} - ${i.price} درهم
<button class="remove" onclick="removeItem(${index})">حذف</button>
</p>
`;
total+=i.price;
});

document.getElementById("items").innerHTML=items;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

/* ===== CART ===== */
function toggleCart(){
let c=document.getElementById("cart");
c.style.display=c.style.display=="block"?"none":"block";
}

/* ===== SEND ===== */
function send(){

let owner="212612345678";

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();
let city=document.getElementById("city").value;

if(!name||!phone||!address){
alert("عمر جميع المعلومات");
return;
}

if(cart.length==0){
alert("السلة فارغة");
return;
}

let msg="طلب جديد\n\n";
msg+="الاسم: "+name+"\n";
msg+="الهاتف: "+phone+"\n";
msg+="العنوان: "+address+"\n";
msg+="المدينة: "+city+"\n\n";

let total=0;

cart.forEach(i=>{
msg+="- "+i.name+" "+i.price+" درهم\n";
total+=i.price;
});

msg+="\nالمجموع: "+total+" درهم";

window.location.href =
"https://wa.me/"+owner+"?text="+encodeURIComponent(msg);

cart=[];
update();
toggleCart();
}

</script>

</body>
</html>
