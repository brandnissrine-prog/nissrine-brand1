<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المفضلات</title>

<style>
body{
font-family:Arial;
background:#f6f6f6;
padding:15px;
}

h2{
text-align:center;
margin-bottom:15px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.name{
font-weight:bold;
margin-top:5px;
}

.price{
color:#111;
margin:5px 0;
}

.remove{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

.empty{
text-align:center;
margin-top:40px;
font-size:18px;
color:#777;
}
</style>
</head>

<body>

<h2>❤️ المفضلات</h2>

<div class="products" id="favBox"></div>

<div class="empty" id="emptyMsg" style="display:none;">
😢 ما عندك حتى منتج في المفضلة
</div>

<script>

/* 📦 نفس المنتجات (ضروري نفسهم) */
let products = JSON.parse(localStorage.getItem("products")) || [];

/* ❤️ المفضلة */
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

let box = document.getElementById("favBox");
let emptyMsg = document.getElementById("emptyMsg");

function loadFav(){

box.innerHTML = "";

/* إذا خاوية */
if(favorites.length === 0){
emptyMsg.style.display = "block";
return;
}else{
emptyMsg.style.display = "none";
}

favorites.forEach(i => {

let p = products[i];
if(!p) return;

box.innerHTML += `
<div class="card">

<img src="${p.images[0]}">

<div class="name">${p.name}</div>
<div class="price">${p.price} درهم</div>

<button class="remove" onclick="removeFav(${i})">
❌ حذف
</button>

</div>
`;

});

}

function removeFav(i){
favorites = favorites.filter(x => x !== i);
localStorage.setItem("favorites", JSON.stringify(favorites));
loadFav();
}

loadFav();

</script>

</body>
</html>
